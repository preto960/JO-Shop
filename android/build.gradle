buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
        // Gradle Plugin Portal: necesario para onesignal-gradle-plugin
        maven { url 'https://plugins.gradle.org/m2/' }
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        // Google Services: procesa google-services.json para FCM (transporte de OneSignal)
        classpath("com.google.gms:google-services:4.4.1")
        // OneSignal Gradle Plugin: agrega SDK nativo + configura FCM + manifest merger
        classpath("com.onesignal:onesignal-gradle-plugin:[0.14.0, 0.99.99]")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
