apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    /* Folders */
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
    cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    debuggableVariants = ["debug"]

    /* Bundling */
    bundleAssetName = "index.android.bundle"
    entryFile = file("../../index.js")
}

android {
    namespace "com.joshop"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.joshop"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // ─── OneSignal ────────────────────────────────────────────
        manifestPlaceholders = [
            onesignal_app_id: 'b35bca3a-765f-4854-bd30-d0c66d421c9f',
            onesignal_google_project_number: 'REMOTE'
        ]
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation "com.facebook.react:react-android:+"
    implementation "com.facebook.react:hermes-android:+"
}

// Auto-linking: genera PackageList.js automaticamente
apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle");
applyNativeModulesAppBuildGradle(project)

// react-native-vector-icons: copy font files to assets/fonts
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")

// ─── OneSignal ─────────────────────────────────────────────────────────────
// react-native-onesignal@4.5.4 usa autolinking (no necesita apply from manual)
// El plugin de gradle se aplica automaticamente via react-native native_modules
